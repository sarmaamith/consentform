<form id="getInTouchForm">

    <div class="modal-grid">

        <div class="field-group">

            <label>Name</label>

            <input
                type="text"
                name="name"
            >

        </div>

        <div class="field-group">

            <label>Email</label>

            <input
                type="email"
                name="email"
            >

        </div>

        <div class="field-group">

            <label>Country</label>

            <select name="country">

                <option value="">
                    Select Country
                </option>

                <option>
                    India
                </option>

                <option>
                    USA
                </option>

                <option>
                    UAE
                </option>

                <option>
                    Singapore
                </option>

            </select>

        </div>

        <div class="field-group">

            <label>City</label>

            <input
                type="text"
                name="city"
            >

        </div>

        <div class="field-group full-width">

            <label>Mobile</label>

            <input
                type="tel"
                name="mobile"
            >

        </div>

    </div>

    <!-- ============================================================
         CONSENT CHECKBOX
    ============================================================ -->

    <div class="consent-line">

        <input
            type="checkbox"
            checked
        >

        <span>
            Yes, I would like to receive updates &
            promotions from Godrej Properties Limited.
        </span>

    </div>

    <!-- ============================================================
         SUBMIT BUTTON
    ============================================================ -->

    <div class="submit-container">

        <button
            type="submit"
            class="submit-btn"
        >
            Submit
        </button>

    </div>

    <!-- ============================================================
         SUCCESS MESSAGE
    ============================================================ -->

    <div
        id="successMessage"
        class="success-message"
    >
        Form submitted successfully.
    </div>

</form>
